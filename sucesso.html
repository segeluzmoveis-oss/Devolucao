<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devolução Solicitada - Lojas Eluz</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page success-page">
    <div class="brand-hero" aria-label="Lojas Eluz Móveis">
      <img src="logo-eluz-3d.png" alt="Lojas Eluz Móveis">
    </div>

    <section class="confirmation-card card">
      <div class="confirmation-icon" aria-hidden="true">✓</div>
      <h1>Devolução solicitada com sucesso!</h1>
      <p class="confirmation-text">
        Sua solicitação foi enviada para análise. A Supervisão já recebeu as informações e dará continuidade ao processo.
      </p>

      <div class="confirmation-info">
        <strong>Próximo passo:</strong>
        <span>Aguarde o retorno do setor responsável sobre a devolução ou troca.</span>
      </div>

      <div class="confirmation-actions">
        <a class="primary-link" href="index.html">Enviar nova devolução</a>
      </div>
    </section>
  </main>
  <footer><p>© 2026 Daniel Soares | Automações</p></footer>
</body>
</html>
